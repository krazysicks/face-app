<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>顔選択AI</title>
  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      background: #111;
      color: #fff;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 50px;
    }

    img {
      width: 250px;
      height: 250px;
      object-fit: cover;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    img:hover {
      transform: scale(1.05);
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <h1>どっちが好み？</h1>

  <div class="container">
    <img id="img1" onclick="choose(1)">
    <img id="img2" onclick="choose(2)">
  </div>

  <script src="script.js"></script>

</body>
</html>
