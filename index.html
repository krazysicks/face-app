<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>顔診断AI</title>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    #game {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    img {
      width: 45%;
      max-width: 200px;
      border-radius: 10px;
      cursor: pointer;
    }

    .selected {
      border: 4px solid green;
    }

    .loser {
      opacity: 0.3;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
    }
  </style>
</head>

<body>

<h1>どっちが好み？</h1>

<div id="game">
  <img id="img1" onclick="choose(1)">
  <img id="img2" onclick="choose(2)">
</div>

<div id="result" style="display:none;">
  <h2 id="resultText"></h2>
  <button onclick="restart()">もう一回</button>
</div>

<script src="script.js"></script>

</body>
</html>
